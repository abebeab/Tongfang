[build]
  command = "echo 'Build command started' && printf 'const EMAILJS_CONFIG = { publicKey: \"%s\", serviceID: \"%s\", adminTemplateID: \"%s\", autoReplyTemplateID: \"%s\" };' \"$EMAILJS_PUBLIC_KEY\" \"$EMAILJS_SERVICE_ID\" \"$EMAILJS_ADMIN_TEMPLATE\" \"$EMAILJS_AUTO_REPLY_TEMPLATE\" > config.js && echo 'config.js created'"
  publish = "."